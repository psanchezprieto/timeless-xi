<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 13">
  <!-- Soviet Union flag: red field, gold star + hammer & sickle -->
  <rect width="20" height="13" fill="#D52B1E"/>
  <!-- Gold 5-pointed star in upper-left -->
  <polygon points="3.5,0.7 4.15,2.55 6.1,2.55 4.6,3.65 5.2,5.5 3.5,4.35 1.8,5.5 2.4,3.65 0.9,2.55 2.85,2.55" fill="#FFD700"/>
  <!-- Hammer head (horizontal) -->
  <rect x="1.8" y="6.8" width="3.2" height="0.9" fill="#FFD700" rx="0.15"/>
  <!-- Hammer handle (vertical) -->
  <rect x="3.0" y="7.6" width="0.9" height="2.4" fill="#FFD700" rx="0.15"/>
  <!-- Sickle blade (arc shape) -->
  <path d="M5.4,6.2 Q8.5,4.2 8.8,6.8 Q9.1,9.8 5.8,10.8 L5.5,10.2 Q8.0,9.4 7.8,6.9 Q7.6,5.0 5.4,6.9 Z" fill="#FFD700"/>
  <!-- Sickle handle -->
  <rect x="5.0" y="10.2" width="1.5" height="0.7" transform="rotate(-30,5.5,10.5)" fill="#FFD700" rx="0.1"/>
</svg>
