<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="shadow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#C8211A" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#C8820A" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow-blue" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#1A5FA0" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow-text" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0F1923" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="60%"  stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EEF1F6"/>
    </linearGradient>
    <linearGradient id="grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="grid-mask">
      <rect x="0" y="390" width="1200" height="240" fill="url(#grid-fade)"/>
    </mask>
    <linearGradient id="horizon-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8211A" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#C8211A" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#C8211A" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#C8211A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C8211A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern in upper area -->
  <g fill="#C8D0DC" opacity="0.5">
    <circle cx="88"   cy="48"  r="2"/>
    <circle cx="210"  cy="32"  r="1.5"/>
    <circle cx="355"  cy="72"  r="2.5"/>
    <circle cx="490"  cy="28"  r="1.5"/>
    <circle cx="640"  cy="55"  r="2"/>
    <circle cx="780"  cy="22"  r="1.5"/>
    <circle cx="920"  cy="68"  r="2.5"/>
    <circle cx="1060" cy="38"  r="2"/>
    <circle cx="1130" cy="82"  r="1.5"/>
    <circle cx="155"  cy="130" r="1.5"/>
    <circle cx="430"  cy="110" r="2"/>
    <circle cx="770"  cy="140" r="1.5"/>
    <circle cx="1040" cy="115" r="2"/>
    <circle cx="60"   cy="200" r="1.5"/>
    <circle cx="1150" cy="180" r="1.5"/>
    <circle cx="300"  cy="170" r="1"/>
    <circle cx="900"  cy="160" r="1"/>
  </g>

  <!-- Perspective grid (masked — fades in from y=390) -->
  <g mask="url(#grid-mask)">
    <!-- Horizontal lines -->
    <g stroke="#1A5FA0" fill="none">
      <line x1="0" y1="398" x2="1200" y2="398" stroke-width="0.5" opacity="0.15"/>
      <line x1="0" y1="412" x2="1200" y2="412" stroke-width="0.6" opacity="0.18"/>
      <line x1="0" y1="430" x2="1200" y2="430" stroke-width="0.7" opacity="0.2"/>
      <line x1="0" y1="453" x2="1200" y2="453" stroke-width="0.8" opacity="0.22"/>
      <line x1="0" y1="482" x2="1200" y2="482" stroke-width="0.9" opacity="0.25"/>
      <line x1="0" y1="516" x2="1200" y2="516" stroke-width="1"   opacity="0.28"/>
      <line x1="0" y1="558" x2="1200" y2="558" stroke-width="1.1" opacity="0.3"/>
      <line x1="0" y1="608" x2="1200" y2="608" stroke-width="1.2" opacity="0.32"/>
    </g>
    <!-- Radial lines converging to VP (600, 390) -->
    <g stroke="#1A5FA0" fill="none" stroke-width="0.7" opacity="0.18">
      <line x1="600" y1="390" x2="-80"  y2="630"/>
      <line x1="600" y1="390" x2="60"   y2="630"/>
      <line x1="600" y1="390" x2="195"  y2="630"/>
      <line x1="600" y1="390" x2="320"  y2="630"/>
      <line x1="600" y1="390" x2="435"  y2="630"/>
      <line x1="600" y1="390" x2="520"  y2="630"/>
      <line x1="600" y1="390" x2="600"  y2="630"/>
      <line x1="600" y1="390" x2="680"  y2="630"/>
      <line x1="600" y1="390" x2="765"  y2="630"/>
      <line x1="600" y1="390" x2="880"  y2="630"/>
      <line x1="600" y1="390" x2="1005" y2="630"/>
      <line x1="600" y1="390" x2="1140" y2="630"/>
      <line x1="600" y1="390" x2="1280" y2="630"/>
    </g>
  </g>

  <!-- Horizon line — red -->
  <rect x="0" y="389" width="1200" height="2.5" fill="url(#horizon-line)" filter="url(#shadow-red)" opacity="0.9"/>

  <!-- Corner brackets -->
  <g stroke="#1A5FA0" stroke-width="2.5" fill="none" opacity="0.45">
    <path d="M 40 40 L 40 80 M 40 40 L 80 40"/>
    <path d="M 1160 40 L 1160 80 M 1160 40 L 1120 40"/>
    <path d="M 40 590 L 40 550 M 40 590 L 80 590"/>
    <path d="M 1160 590 L 1160 550 M 1160 590 L 1120 590"/>
  </g>

  <!-- TIMELESS — deep red -->
  <text
    x="600" y="208"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="22"
    fill="#C8211A"
    filter="url(#shadow-red)"
  >TIMELESS</text>

  <!-- XI — gold -->
  <text
    x="606" y="352"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-size="172"
    font-weight="900"
    letter-spacing="40"
    fill="#C8820A"
    filter="url(#shadow-gold)"
  >XI</text>

  <!-- Divider dots -->
  <g fill="#1A5FA0" opacity="0.5">
    <circle cx="540" cy="372" r="3"/>
    <circle cx="600" cy="372" r="3"/>
    <circle cx="660" cy="372" r="3"/>
  </g>

  <!-- Tagline -->
  <text
    x="600" y="408"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="21"
    font-weight="400"
    letter-spacing="7"
    fill="#1A5FA0"
    filter="url(#shadow-blue)"
    opacity="0.9"
  >BUILD YOUR DREAM SQUAD FROM HISTORY</text>

  <!-- Country badges row -->
  <g font-family="'Arial Black', 'Impact', sans-serif" font-size="13" font-weight="900" letter-spacing="1" text-anchor="middle">
    <!-- BRA -->
    <rect x="238" y="454" width="68" height="28" rx="3" fill="none" stroke="#009C3B" stroke-width="1.5" opacity="0.8"/>
    <text x="272" y="472" fill="#007A2E" opacity="0.9">BRA</text>
    <!-- GER -->
    <rect x="318" y="454" width="68" height="28" rx="3" fill="none" stroke="#555555" stroke-width="1.5" opacity="0.6"/>
    <text x="352" y="472" fill="#333333" opacity="0.8">GER</text>
    <!-- ARG -->
    <rect x="398" y="454" width="68" height="28" rx="3" fill="none" stroke="#74ACDF" stroke-width="1.5" opacity="0.8"/>
    <text x="432" y="472" fill="#2A7BBF" opacity="0.9">ARG</text>
    <!-- FRA -->
    <rect x="478" y="454" width="68" height="28" rx="3" fill="none" stroke="#002395" stroke-width="1.5" opacity="0.7"/>
    <text x="512" y="472" fill="#002395" opacity="0.9">FRA</text>
    <!-- ITA -->
    <rect x="558" y="454" width="68" height="28" rx="3" fill="none" stroke="#009246" stroke-width="1.5" opacity="0.8"/>
    <text x="592" y="472" fill="#007A2E" opacity="0.9">ITA</text>
    <!-- ESP -->
    <rect x="638" y="454" width="68" height="28" rx="3" fill="none" stroke="#C8211A" stroke-width="1.5" opacity="0.8"/>
    <text x="672" y="472" fill="#C8211A" opacity="0.9">ESP</text>
    <!-- NED -->
    <rect x="718" y="454" width="68" height="28" rx="3" fill="none" stroke="#CC5500" stroke-width="1.5" opacity="0.8"/>
    <text x="752" y="472" fill="#CC5500" opacity="0.9">NED</text>
    <!-- ENG -->
    <rect x="798" y="454" width="68" height="28" rx="3" fill="none" stroke="#555555" stroke-width="1.5" opacity="0.5"/>
    <text x="832" y="472" fill="#333333" opacity="0.7">ENG</text>
    <!-- +30 -->
    <text x="900" y="472" fill="#8A9BB0" font-size="18" opacity="0.7">+ 30</text>
  </g>

  <!-- Bottom URL -->
  <text
    x="600" y="610"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="15"
    letter-spacing="5"
    fill="#3D5168"
    opacity="0.4"
  >TIMELESS-XI.COM</text>
</svg>
