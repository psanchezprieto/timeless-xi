<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeless XI — World Cup Dream Teams</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --bg:          #F0EBE1;
      --surface:     #FFFFFF;
      --surface-hi:  #F7F3EE;
      --border:      #CBBFB0;
      --accent:      #D44028;
      --accent-h:    #E8553E;
      --cyan:        #0A7A84;
      --gold:        #B06A00;
      --text:        #1A3840;
      --text-sub:    #4A6B75;
      --text-dim:    #8AA5AE;
    }

    [data-theme="dark"] {
      --bg:          #0B2D35;
      --surface:     #0F3A44;
      --surface-hi:  #174F5E;
      --border:      #1E6070;
      --accent:      #E8553E;
      --accent-h:    #F26E59;
      --cyan:        #1BB9C4;
      --gold:        #F0A500;
      --text:        #F5EEE6;
      --text-sub:    #B8D4DA;
      --text-dim:    #6B9FAD;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      /* Subtle diagonal grid — Italia 90 broadcast feel */
      background-image:
        repeating-linear-gradient(
          135deg,
          rgba(0,0,0,0.025) 0px,
          rgba(0,0,0,0.025) 1px,
          transparent 1px,
          transparent 40px
        );
    }

    h1, h2, h3, h4 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    #app { min-height: 100vh; width: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-hi); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

    /* Embossed flag */
    .flag-emboss {
      position: relative;
      border-radius: 2px;
      overflow: hidden;
      box-shadow:
        -1px -1px 0 rgba(255,255,255,0.9),
        2px  2px  0 rgba(0,0,0,0.18),
        0 4px 10px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] .flag-emboss {
      box-shadow:
        -1px -1px 0 rgba(255,255,255,0.35),
        2px  2px  0 rgba(0,0,0,0.55),
        0 4px 10px rgba(0,0,0,0.45);
    }
    /* Diagonal gloss: bright top-left → dark bottom-right */
    .flag-emboss::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.25) 0%,
        transparent            45%,
        rgba(0,0,0,0.06)      100%
      );
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.2s ease forwards; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
