<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeless XI — Build Your World Cup Dream Team</title>
  <meta name="description" content="Pick any national team, roll the dice to land on a World Cup era, and build your ultimate XI from history's greatest squads. Free browser game.">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://timeless-xi.com/">
  <meta property="og:title" content="Timeless XI — Build Your World Cup Dream Team">
  <meta property="og:description" content="Pick any national team, roll the dice to land on a World Cup era, and build your ultimate XI from history's greatest squads.">
  <meta property="og:image" content="https://timeless-xi.com/og-image.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Timeless XI — Build Your World Cup Dream Team">
  <meta name="twitter:description" content="Pick any national team, roll the dice to land on a World Cup era, and build your ultimate XI.">
  <meta name="twitter:image" content="https://timeless-xi.com/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --bg:          #F5F7FA;
      --surface:     #FFFFFF;
      --surface-hi:  #EEF1F6;
      --border:      #C8D0DC;
      --accent:      #C8211A;
      --accent-h:    #E02B23;
      --cyan:        #1A5FA0;
      --gold:        #C8820A;
      --text:        #0F1923;
      --text-sub:    #3D5168;
      --text-dim:    #8A9BB0;
    }

    [data-theme="dark"] {
      --bg:          #0B2D35;
      --surface:     #0F3A44;
      --surface-hi:  #174F5E;
      --border:      #1E6070;
      --accent:      #E8553E;
      --accent-h:    #F26E59;
      --cyan:        #1BB9C4;
      --gold:        #F0A500;
      --text:        #F5EEE6;
      --text-sub:    #B8D4DA;
      --text-dim:    #6B9FAD;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      /* Subtle diagonal grid — Italia 90 broadcast feel */
      background-image:
        repeating-linear-gradient(
          135deg,
          rgba(26,95,160,0.04) 0px,
          rgba(26,95,160,0.04) 1px,
          transparent 1px,
          transparent 40px
        );
    }

    h1, h2, h3, h4 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    #app { min-height: 100vh; width: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-hi); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

    /* Embossed flag */
    .flag-emboss {
      position: relative;
      border-radius: 2px;
      overflow: hidden;
      box-shadow:
        -1px -1px 0 rgba(255,255,255,0.9),
        2px  2px  0 rgba(0,0,0,0.18),
        0 4px 10px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] .flag-emboss {
      box-shadow:
        -1px -1px 0 rgba(255,255,255,0.35),
        2px  2px  0 rgba(0,0,0,0.55),
        0 4px 10px rgba(0,0,0,0.45);
    }
    /* Diagonal gloss: bright top-left → dark bottom-right */
    .flag-emboss::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.25) 0%,
        transparent            45%,
        rgba(0,0,0,0.06)      100%
      );
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .how-it-works-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.2s ease forwards; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Ko-fi subtle floating widget -->
  <style>
    #kofi-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 6px 10px 6px 8px;
      box-shadow: 2px 2px 0 var(--border);
      opacity: 1;
      transition: opacity 0.2s;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 12px;
      color: var(--text-sub);
      text-decoration: none;
    }
    #kofi-widget:hover { opacity: 1; }
    #kofi-widget a {
      display: flex;
      align-items: center;
      gap: 6px;
      color: inherit;
      text-decoration: none;
    }
    #kofi-close {
      margin-left: 4px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      background: none;
      border: none;
      font-family: inherit;
    }
    #kofi-close:hover { color: var(--text); }
  </style>
  <div id="kofi-widget">
    <a href="https://ko-fi.com/timelesseleven" target="_blank" rel="noopener">
      ☕ support if you enjoyed it
    </a>
    <button id="kofi-close" aria-label="Dismiss">✕</button>
  </div>
  <script>
    (function() {
      var widget = document.getElementById('kofi-widget');
      if (localStorage.getItem('kofi-dismissed')) {
        widget.style.display = 'none';
      }
      document.getElementById('kofi-close').addEventListener('click', function(e) {
        e.preventDefault();
        widget.style.display = 'none';
        localStorage.setItem('kofi-dismissed', '1');
        if (window.posthog) window.posthog.capture('kofi_dismissed');
      });
      document.querySelector('#kofi-widget a').addEventListener('click', function() {
        if (window.posthog) window.posthog.capture('kofi_clicked');
      });
    })();
  </script>
</body>
</html>
